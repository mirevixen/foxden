<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Den Alerts</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

/* OBS browser source — transparent background */
body {
  background: transparent;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 20px;
  font-family: 'Crimson Pro', Georgia, serif;
}

/* ── ALERT CONTAINER ── */
#alertWrap {
  position: relative;
  width: 580px;
  pointer-events: none;
}

.alert {
  width: 100%;
  border-radius: 4px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  overflow: hidden;
  animation: alertIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
             alertOut 0.4s ease-in 4.6s forwards;
  opacity: 0;
}

@keyframes alertIn {
  0%  { opacity: 0; transform: translateY(-28px) scale(0.94); }
  100%{ opacity: 1; transform: translateY(0)     scale(1);    }
}
@keyframes alertOut {
  0%  { opacity: 1; transform: translateY(0)   scale(1);    }
  100%{ opacity: 0; transform: translateY(-12px) scale(0.97); }
}

/* Shimmer sweep */
.alert::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.06) 50%, transparent 60%);
  animation: shimmer 1.2s ease 0.3s forwards;
  opacity: 0;
}
@keyframes shimmer {
  0%  { opacity: 0; transform: translateX(-100%); }
  30% { opacity: 1; }
  100%{ opacity: 0; transform: translateX(100%);  }
}

/* ── STYLES PER ALERT TYPE ── */

/* CURSE brews */
.alert.curse {
  background: rgba(12, 6, 6, 0.92);
  border: 1px solid rgba(180, 40, 40, 0.7);
  border-left: 4px solid #c94040;
  box-shadow: 0 0 28px rgba(180, 40, 40, 0.25), 0 4px 20px rgba(0,0,0,0.7);
}
.alert.curse .al-icon { color: #f08080; }
.alert.curse .al-title { color: #f5c0c0; }
.alert.curse .al-buyer { color: #c87070; }
.alert.curse .al-msg { color: #d4a0a0; }
.alert.curse .al-effect { background: rgba(180,40,40,0.15); border: 1px solid rgba(180,40,40,0.3); color: #f08080; }

/* BOOST brews */
.alert.boost {
  background: rgba(6, 12, 10, 0.92);
  border: 1px solid rgba(58, 158, 143, 0.6);
  border-left: 4px solid #3a9e8f;
  box-shadow: 0 0 28px rgba(58, 158, 143, 0.2), 0 4px 20px rgba(0,0,0,0.7);
}
.alert.boost .al-icon { color: #5ecfbe; }
.alert.boost .al-title { color: #a0f0e0; }
.alert.boost .al-buyer { color: #70b8ae; }
.alert.boost .al-msg { color: #90d4c8; }
.alert.boost .al-effect { background: rgba(58,158,143,0.12); border: 1px solid rgba(58,158,143,0.3); color: #5ecfbe; }

/* WAGER alerts */
.alert.wager {
  background: rgba(8, 8, 14, 0.92);
  border: 1px solid rgba(100, 80, 200, 0.6);
  border-left: 4px solid #7060d0;
  box-shadow: 0 0 28px rgba(100, 80, 200, 0.2), 0 4px 20px rgba(0,0,0,0.7);
}
.alert.wager .al-icon { color: #c0b0f8; }
.alert.wager .al-title { color: #d8d0ff; }
.alert.wager .al-buyer { color: #9080d0; }
.alert.wager .al-msg { color: #c0b8f0; }
.alert.wager .al-effect { background: rgba(100,80,200,0.12); border: 1px solid rgba(100,80,200,0.3); color: #c0b0f8; }

/* WIN / RESOLVE alerts */
.alert.win {
  background: rgba(10, 10, 6, 0.92);
  border: 1px solid rgba(200, 160, 40, 0.6);
  border-left: 4px solid #d4aa3a;
  box-shadow: 0 0 28px rgba(200, 160, 40, 0.22), 0 4px 20px rgba(0,0,0,0.7);
}
.alert.win .al-icon { color: #d4aa3a; }
.alert.win .al-title { color: #f0d070; }
.alert.win .al-buyer { color: #a08030; }
.alert.win .al-msg { color: #e0c060; }
.alert.win .al-effect { background: rgba(200,160,40,0.12); border: 1px solid rgba(200,160,40,0.3); color: #d4aa3a; }

/* ICON */
.al-icon {
  font-size: 36px;
  flex-shrink: 0;
  line-height: 1;
  filter: drop-shadow(0 0 8px currentColor);
}

/* TEXT BLOCK */
.al-text { flex: 1; min-width: 0; }
.al-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 14px;
  letter-spacing: 1px;
  margin-bottom: 3px;
}
.al-buyer {
  font-size: 13px;
  font-style: italic;
  margin-bottom: 5px;
}
.al-msg {
  font-size: 15px;
  line-height: 1.4;
}
.al-effect {
  display: inline-block;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 2px;
  margin-top: 5px;
  font-style: italic;
}

/* ── PER-BREW ACCENT COLOURS ── */
/* Each brew key gets a slightly different icon glow / border tint */
.alert[data-brew="devlyn_spite"]  { border-left-color: #d04060; }
.alert[data-brew="ulli_slow"]     { border-left-color: #a060c0; }
.alert[data-brew="banshee_chamomile"] { border-left-color: #6080d0; }
.alert[data-brew="cursed_earl"]   { border-left-color: #4050a0; }
.alert[data-brew="ghost_herbal"]  { border-left-color: #406040; }
.alert[data-brew="map_pick_phasmo"] { border-left-color: #8050c0; }
.alert[data-brew="map_pick_demon"]  { border-left-color: #a04040; }
.alert[data-brew="fox_blend"]     { border-left-color: #c8832a; }
.alert[data-brew="lucky_roast"]   { border-left-color: #40a060; }
.alert[data-brew="lucky_paw"]     { border-left-color: #a0c040; }
.alert[data-brew="treasure_chest"]{ border-left-color: #d4aa3a; }
.alert[data-brew="new_cards"]     { border-left-color: #40a0c0; }
.alert[data-brew="random_event"]  { border-left-color: #c04080; }
.alert[data-brew="pick_event"]    { border-left-color: #e8a84a; }
</style>
</head>
<body>
<div id="alertWrap"></div>

<script>
const SURL = 'https://iirhceqhebwqulbwqmdz.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcmhjZXFoZWJ3cXVsYndxbWR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjEwMTYsImV4cCI6MjA4ODk5NzAxNn0.FLbqROssXJooPY3Qcxwmpkl49-brKmXLBEwm1ZjTY60';
const sb = supabase.createClient(SURL, SKEY);

// ── BREW METADATA ── (icon + style per brew key)
const BREW_META = {
  devlyn_spite:     { icon: '😾', label: "Devlyn's Spite Brew",       style: 'curse' },
  ulli_slow:        { icon: '🐾', label: "Ulli's Slow Paw",            style: 'curse' },
  banshee_chamomile:{ icon: '☕', label: "Banshee's Chamomile",        style: 'curse' },
  cursed_earl:      { icon: '🫖', label: "Cursed Earl Grey",           style: 'curse' },
  ghost_herbal:     { icon: '🌿', label: "Ghost's Herbal Blend",       style: 'curse' },
  map_pick_phasmo:  { icon: '🗺️', label: "Cartographer's Curse (Phasmo)", style: 'curse' },
  map_pick_demon:   { icon: '🗺️', label: "Cartographer's Curse (Demon)",  style: 'curse' },
  fox_blend:        { icon: '🦊', label: "Fox Den House Blend",        style: 'boost' },
  lucky_roast:      { icon: '🍀', label: "Mire's Lucky Roast",         style: 'boost' },
  lucky_paw:        { icon: '🐾', label: "Ulli's Lucky Paw",           style: 'boost' },
  treasure_chest:   { icon: '📦', label: "Devlyn's Treasure Chest",    style: 'boost' },
  new_cards:        { icon: '🃏', label: "Fresh Deck",                 style: 'boost' },
  random_event:     { icon: '🎴', label: "Devlyn's Wild Card",         style: 'boost' },
  pick_event:       { icon: '✨', label: "Ulli's Chosen Moment",       style: 'boost' },
};

let alertQueue = [];
let alertRunning = false;
const ALERT_DURATION = 5000; // ms visible before next

// ── SHOW ALERT ──
function showAlert(a) {
  const wrap = document.getElementById('alertWrap');
  wrap.innerHTML = '';

  const meta = BREW_META[a.brew_key] || {};
  const style = a.style || meta.style || 'boost';
  const icon = a.icon || meta.icon || '🦊';
  const title = a.title || meta.label || 'Fox Den Alert';

  const el = document.createElement('div');
  el.className = `alert ${style}`;
  if (a.brew_key) el.setAttribute('data-brew', a.brew_key);

  el.innerHTML = `
    <div class="al-icon">${icon}</div>
    <div class="al-text">
      <div class="al-title">${title}</div>
      ${a.buyer ? `<div class="al-buyer">${a.buyer} spent ${a.cost || '?'}🦊</div>` : ''}
      ${a.message ? `<div class="al-msg">${a.message}</div>` : ''}
      ${a.effect ? `<div class="al-effect">${a.effect}</div>` : ''}
    </div>`;

  wrap.appendChild(el);

  setTimeout(() => {
    wrap.innerHTML = '';
    alertRunning = false;
    processQueue();
  }, ALERT_DURATION);
}

function processQueue() {
  if (alertRunning || !alertQueue.length) return;
  alertRunning = true;
  showAlert(alertQueue.shift());
}

// ── REALTIME SUBSCRIPTION ──
sb.channel('foxden-alerts')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'alerts' }, async (payload) => {
    const a = payload.new;
    // Mark as shown immediately so it doesn't re-fire on reconnect
    await sb.from('alerts').update({ shown: true }).eq('id', a.id);
    alertQueue.push(a);
    processQueue();
  })
  .subscribe();

// On load, drain any unshown alerts from before OBS opened
(async () => {
  const { data } = await sb.from('alerts')
    .select('*').eq('shown', false)
    .order('created_at', { ascending: true });
  if (data?.length) {
    // Mark all as shown but only display the most recent one
    for (const a of data) {
      await sb.from('alerts').update({ shown: true }).eq('id', a.id);
    }
    alertQueue.push(data[data.length - 1]);
    processQueue();
  }
})();
</script>
</body>
</html>
